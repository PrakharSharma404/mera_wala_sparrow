apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'deploy-service'
        static_configs:
          - targets: ['deploy-service.sparrow-vps.svc.cluster.local:2112']
      - job_name: 'container-service'
        static_configs:
          - targets: ['container-service-svc.sparrow-vps.svc.cluster.local:2112']

